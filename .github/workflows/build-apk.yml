name: Build APK

# Tự động build APK mỗi khi bạn đẩy code lên nhánh main,
# hoặc bạn có thể bấm chạy thủ công trong tab Actions trên GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate missing platform folders (android/ios)
        run: flutter create . --platforms=android --org com.example

      - name: Rebrand app label to Tchat
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Tchat"/' android/app/src/main/AndroidManifest.xml
          if [ -f android/app/src/main/res/values/strings.xml ]; then
            sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">Tchat<\/string>/' android/app/src/main/res/values/strings.xml
          fi

      - name: Lower minSdkVersion for Android 8.1 (API 27) support
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
            sed -i 's/minSdk = [0-9]\+/minSdk = 21/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
            sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/' android/app/build.gradle
          fi

      - name: Add notification permission
        run: |
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (normal Android - universal, all ABIs)
        run: flutter build apk --release
      - name: Rename universal APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Tchat-Android-thuong.apk

      - name: Build APK (KEY2 LE - arm64 only, smaller size)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi
      - name: Rename KEY2 LE APK
        run: cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/Tchat-KEY2LE.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mini-chat-app-release-apk
          path: |
            build/app/outputs/flutter-apk/Tchat-Android-thuong.apk
            build/app/outputs/flutter-apk/Tchat-KEY2LE.apk
