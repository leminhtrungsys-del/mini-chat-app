name: Build APK

# Tự động build APK mỗi khi bạn đẩy code lên nhánh main,
# hoặc bạn có thể bấm chạy thủ công trong tab Actions trên GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate missing platform folders (android/ios)
        run: flutter create . --platforms=android --org com.example

      - name: Debug - show manifest BEFORE rebrand
        run: cat android/app/src/main/AndroidManifest.xml

      - name: Rebrand app label to Tchat
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Tchat"/' android/app/src/main/AndroidManifest.xml
          if [ -f android/app/src/main/res/values/strings.xml ]; then
            sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">Tchat<\/string>/' android/app/src/main/res/values/strings.xml
          fi

      - name: Debug - show manifest AFTER rebrand
        run: cat android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-chat-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
